<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claudy - Asistente IA Personal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .prose pre { background: #1f2937; color: #f3f4f6; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; }
    .prose code { background: #e5e7eb; padding: 0.125rem 0.25rem; border-radius: 0.25rem; font-size: 0.875rem; }
    .dark .prose code { background: #374151; }
    .prose pre code { background: transparent; padding: 0; }
    .markdown p { margin-bottom: 0.5rem; }
    .markdown ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 0.5rem; }
    .markdown ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 0.5rem; }
    .markdown h1, .markdown h2, .markdown h3 { font-weight: 600; margin: 0.75rem 0 0.5rem; }
    .markdown blockquote { border-left: 3px solid #3b82f6; padding-left: 1rem; color: #6b7280; font-style: italic; }
    .markdown table { width: 100%; border-collapse: collapse; margin-bottom: 0.5rem; }
    .markdown th, .markdown td { border: 1px solid #e5e7eb; padding: 0.5rem; text-align: left; }
    .dark .markdown th, .dark .markdown td { border-color: #374151; }
    .markdown th { background: #f9fafb; font-weight: 600; }
    .dark .markdown th { background: #1f2937; }
    .typing-dot { animation: bounce 1.4s infinite ease-in-out both; }
    .typing-dot:nth-child(1) { animation-delay: -0.32s; }
    .typing-dot:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 h-screen overflow-hidden">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;
    const API_URL = "http://127.0.0.1:3001";
    const WS_URL = "ws://127.0.0.1:3001/ws";

    // Simple markdown parser
    function parseMarkdown(text) {
      if (!text) return '';
      let html = text
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/^### (.*$)/gim, '<h3 class="text-lg font-semibold mt-3 mb-2">$1</h3>')
        .replace(/^## (.*$)/gim, '<h2 class="text-xl font-semibold mt-4 mb-2">$1</h2>')
        .replace(/^# (.*$)/gim, '<h1 class="text-2xl font-bold mt-4 mb-2">$1</h1>')
        .replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
        .replace(/^> (.*$)/gim, '<blockquote>$1</blockquote>')
        .replace(/^\- (.*$)/gim, '<li>$1</li>')
        .replace(/(<li>.*<\/li>)/s, '<ul class="list-disc pl-5 my-2">$1</ul>')
        .replace(/\n/g, '<br>');
      return { __html: html };
    }

    function Sidebar({ sessions, currentSessionId, onSelect, onDelete, onCreate }) {
      return (
        <div className="flex flex-col h-full w-72 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700">
          <div className="p-4 border-b border-gray-200 dark:border-gray-700">
            <button onClick={onCreate}
              className="w-full flex items-center justify-center gap-2 px-4 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium transition-colors">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
              Nueva conversacion
            </button>
          </div>
          <div className="flex-1 overflow-y-auto p-2 space-y-1">
            {sessions.map(s => (
              <div key={s.id} onClick={() => onSelect(s.id)}
                className={`group flex items-center gap-2 px-3 py-2.5 rounded-lg cursor-pointer transition-colors ${
                  currentSessionId === s.id
                    ? "bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800"
                    : "hover:bg-gray-100 dark:hover:bg-gray-700"
                }`}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="text-gray-400 flex-shrink-0"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                <span className="flex-1 text-sm truncate">{s.title}</span>
                <button onClick={(e) => { e.stopPropagation(); onDelete(s.id); }}
                  className="opacity-0 group-hover:opacity-100 p-1 hover:bg-red-100 dark:hover:bg-red-900/30 text-gray-400 hover:text-red-600 rounded transition-all">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                </button>
              </div>
            ))}
            {sessions.length === 0 && (
              <div className="text-center text-gray-400 text-sm py-8">No hay conversaciones aun</div>
            )}
          </div>
          <div className="p-4 border-t border-gray-200 dark:border-gray-700">
            <div className="text-xs text-gray-400 text-center">Claudy v0.1.0 - Fork de OpenClaw</div>
          </div>
        </div>
      );
    }

    function Chat({ messages, isLoading, onSend, onCreateSession }) {
      const [input, setInput] = useState("");
      const scrollRef = useRef(null);

      useEffect(() => {
        if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
      }, [messages, isLoading]);

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!input.trim() || isLoading) return;
        onSend(input.trim());
        setInput("");
      };

      return (
        <div className="flex-1 flex flex-col min-w-0">
          <div ref={scrollRef} className="flex-1 overflow-y-auto">
            {messages.length === 0 ? (
              <div className="flex flex-col items-center justify-center h-full gap-6 px-4">
                <div className="w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center shadow-lg">
                  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2"><path d="M12 3v18M3 12h18M7.5 7.5l9 9M16.5 7.5l-9 9"/></svg>
                </div>
                <div className="text-center max-w-md">
                  <h2 className="text-2xl font-bold mb-2">Bienvenido a Claudy</h2>
                  <p className="text-gray-500 dark:text-gray-400 mb-6">
                    Tu asistente de IA personal. Escribe un mensaje para comenzar.
                  </p>
                  <div className="flex flex-wrap justify-center gap-2">
                    {["Explicame que es OpenClaw", "Busca las ultimas noticias de IA", "Ayudame a escribir un email", "Resume este concepto para mi"].map(p => (
                      <button key={p} onClick={() => onSend(p)}
                        className="px-4 py-2 text-sm bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-full hover:border-blue-400 hover:text-blue-600 dark:hover:text-blue-400 transition-colors">
                        {p}
                      </button>
                    ))}
                  </div>
                </div>
              </div>
            ) : (
              <div className="max-w-3xl mx-auto px-4 py-6 space-y-6">
                {messages.map(msg => {
                  const isUser = msg.role === 'user';
                  const isTool = msg.role === 'tool';
                  return (
                    <div key={msg.id} className={`flex gap-3 ${isUser ? 'flex-row-reverse' : 'flex-row'}`}>
                      <div className={`flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center ${
                        isUser ? 'bg-blue-600' : isTool ? 'bg-gray-500' : 'bg-gradient-to-br from-purple-500 to-blue-600'
                      }`}>
                        {isUser ? (
                          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        ) : isTool ? (
                          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>
                        ) : (
                          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
                        )}
                      </div>
                      <div className={`max-w-[80%] px-4 py-3 rounded-2xl ${
                        isUser ? 'bg-blue-600 text-white rounded-br-sm' :
                        isTool ? 'bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400 text-sm border border-gray-200 dark:border-gray-700' :
                        'bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-bl-sm shadow-sm'
                      }`}>
                        {isTool ? (
                          <div className="font-mono text-xs">
                            <div className="text-gray-400 mb-1">Tool result:</div>
                            <pre className="whitespace-pre-wrap">{msg.content}</pre>
                          </div>
                        ) : (
                          <div className="markdown" dangerouslySetInnerHTML={parseMarkdown(msg.content)} />
                        )}
                      </div>
                    </div>
                  );
                })}
                {isLoading && (
                  <div className="flex items-center gap-2 text-gray-400 text-sm">
                    <div className="w-2 h-2 bg-blue-500 rounded-full typing-dot"></div>
                    <div className="w-2 h-2 bg-blue-500 rounded-full typing-dot"></div>
                    <div className="w-2 h-2 bg-blue-500 rounded-full typing-dot"></div>
                  </div>
                )}
              </div>
            )}
          </div>
          <div className="border-t border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 p-4">
            <form onSubmit={handleSubmit} className="max-w-3xl mx-auto flex items-end gap-2">
              <div className="flex-1">
                <textarea value={input} onChange={e => setInput(e.target.value)}
                  onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSubmit(e); } }}
                  placeholder="Escribe un mensaje..." rows={1}
                  className="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none max-h-32"
                  style={{ minHeight: '48px' }} />
              </div>
              <button type="submit" disabled={!input.trim() || isLoading}
                className="p-3 bg-blue-600 hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed text-white rounded-xl transition-colors">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
              </button>
            </form>
            <div className="max-w-3xl mx-auto mt-2 text-xs text-gray-400 text-center">
              Claudy puede cometer errores. Verifica la informacion importante.
            </div>
          </div>
        </div>
      );
    }

    function Settings({ config, onClose, onSave }) {
      const [apiKey, setApiKey] = useState('');
      const [systemPrompt, setSystemPrompt] = useState(config?.agent?.systemPrompt || '');
      const [temperature, setTemperature] = useState(config?.agent?.temperature || 0.7);
      const [maxTokens, setMaxTokens] = useState(config?.agent?.maxTokens || 4096);
      const [saved, setSaved] = useState(false);

      const handleSave = async () => {
        const body = { agent: { systemPrompt, temperature, maxTokens } };
        if (apiKey) body.openrouter = { apiKey };
        await fetch('/api/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        setSaved(true);
        setTimeout(() => setSaved(false), 2000);
        onSave();
      };

      return (
        <div className="flex-1 overflow-y-auto p-8">
          <div className="max-w-2xl mx-auto">
            <div className="flex items-center justify-between mb-8">
              <h2 className="text-2xl font-bold">Configuracion</h2>
              <button onClick={onClose} className="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-colors">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
              </button>
            </div>
            <div className="space-y-6">
              <div className="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-6">
                <h3 className="text-lg font-semibold mb-4">OpenRouter API Key</h3>
                <input type="password" value={apiKey} onChange={e => setApiKey(e.target.value)}
                  placeholder="sk-or-v1-..."
                  className="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500" />
                <p className="text-sm text-gray-500 mt-2">Tu API key se guarda localmente en ~/.claudy/config.json</p>
              </div>
              <div className="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-6">
                <h3 className="text-lg font-semibold mb-4">Agente</h3>
                <div className="space-y-4">
                  <div>
                    <label className="block text-sm font-medium mb-1">System Prompt</label>
                    <textarea value={systemPrompt} onChange={e => setSystemPrompt(e.target.value)} rows={4}
                      className="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500" />
                  </div>
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-sm font-medium mb-1">Temperature: {temperature}</label>
                      <input type="range" min="0" max="2" step="0.1" value={temperature}
                        onChange={e => setTemperature(Number(e.target.value))} className="w-full" />
                    </div>
                    <div>
                      <label className="block text-sm font-medium mb-1">Max Tokens</label>
                      <input type="number" value={maxTokens} onChange={e => setMaxTokens(Number(e.target.value))}
                        className="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500" />
                    </div>
                  </div>
                </div>
              </div>
              <button onClick={handleSave}
                className="w-full flex items-center justify-center gap-2 px-4 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-medium transition-colors">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                {saved ? 'Guardado!' : 'Guardar configuracion'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [showSidebar, setShowSidebar] = useState(true);
      const [showSettings, setShowSettings] = useState(false);
      const [sessions, setSessions] = useState([]);
      const [currentSessionId, setCurrentSessionId] = useState(null);
      const [messages, setMessages] = useState([]);
      const [isLoading, setIsLoading] = useState(false);
      const [models, setModels] = useState([]);
      const [currentModel, setCurrentModel] = useState('openai/gpt-4o-mini');
      const [config, setConfig] = useState(null);
      const wsRef = useRef(null);
      const currentContentRef = useRef('');

      const loadSessions = useCallback(async () => {
        const res = await fetch(`${API_URL}/api/sessions`);
        const data = await res.json();
        setSessions(data);
      }, []);

      const loadConfig = useCallback(async () => {
        const res = await fetch(`${API_URL}/api/config`);
        const data = await res.json();
        setConfig(data);
        setCurrentModel(data.openrouter.defaultModel);
      }, []);

      const loadModels = useCallback(async () => {
        try {
          const res = await fetch(`${API_URL}/api/models`);
          const data = await res.json();
          setModels(data.slice(0, 100));
        } catch {}
      }, []);

      useEffect(() => {
        loadSessions();
        loadConfig();
        loadModels();
      }, [loadSessions, loadConfig, loadModels]);

      useEffect(() => {
        if (currentSessionId) {
          const session = sessions.find(s => s.id === currentSessionId);
          if (session) {
            setMessages(session.messages);
            setCurrentModel(session.model);
          }
        }
      }, [currentSessionId, sessions]);

      const connectWebSocket = useCallback(() => {
        if (wsRef.current?.readyState === WebSocket.OPEN) return;
        const ws = new WebSocket(WS_URL);
        wsRef.current = ws;
        ws.onopen = () => console.log('[ws] connected');
        ws.onclose = () => setTimeout(connectWebSocket, 3000);
        ws.onmessage = (event) => {
          const data = JSON.parse(event.data);
          if (data.type === 'chunk') {
            currentContentRef.current += data.content;
            setMessages(prev => {
              const last = prev[prev.length - 1];
              if (last && last.role === 'assistant') {
                const updated = [...prev];
                updated[updated.length - 1] = { ...last, content: currentContentRef.current };
                return updated;
              }
              return [...prev, { id: crypto.randomUUID(), role: 'assistant', content: currentContentRef.current, timestamp: Date.now() }];
            });
          } else if (data.type === 'done') {
            setIsLoading(false);
            currentContentRef.current = '';
            loadSessions();
          } else if (data.type === 'error') {
            setIsLoading(false);
            currentContentRef.current = '';
            setMessages(prev => [...prev, { id: crypto.randomUUID(), role: 'assistant', content: `Error: ${data.message}`, timestamp: Date.now() }]);
          }
        };
      }, [loadSessions]);

      useEffect(() => {
        connectWebSocket();
        return () => wsRef.current?.close();
      }, [connectWebSocket]);

      const createSession = useCallback(async () => {
        const res = await fetch(`${API_URL}/api/sessions`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ model: currentModel })
        });
        const session = await res.json();
        setSessions(prev => [session, ...prev]);
        setCurrentSessionId(session.id);
        setMessages([]);
        return session.id;
      }, [currentModel]);

      const selectSession = useCallback((id) => {
        setCurrentSessionId(id);
        currentContentRef.current = '';
      }, []);

      const deleteSession = useCallback(async (id) => {
        await fetch(`${API_URL}/api/sessions/${id}`, { method: 'DELETE' });
        setSessions(prev => prev.filter(s => s.id !== id));
        if (currentSessionId === id) { setCurrentSessionId(null); setMessages([]); }
      }, [currentSessionId]);

      const sendMessage = useCallback(async (content) => {
        let sessionId = currentSessionId;
        if (!sessionId) sessionId = await createSession();
        setMessages(prev => [...prev, { id: crypto.randomUUID(), role: 'user', content, timestamp: Date.now() }]);
        setIsLoading(true);
        currentContentRef.current = '';
        wsRef.current?.send(JSON.stringify({ type: 'chat', sessionId, message: content, model: currentModel }));
      }, [currentSessionId, currentModel, createSession]);

      const changeModel = useCallback(async (model) => {
        setCurrentModel(model);
        if (currentSessionId) {
          await fetch(`${API_URL}/api/sessions/${currentSessionId}/model`, {
            method: 'PATCH', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ model })
          });
        }
      }, [currentSessionId]);

      return (
        <div className="flex h-screen w-screen bg-gray-50 dark:bg-gray-900">
          <div className={`${showSidebar ? 'w-72' : 'w-0'} flex-shrink-0 transition-all duration-300 overflow-hidden bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700`}>
            <Sidebar sessions={sessions} currentSessionId={currentSessionId}
              onSelect={selectSession} onDelete={deleteSession} onCreate={createSession} />
          </div>
          <div className="flex-1 flex flex-col min-w-0">
            <header className="h-14 flex items-center justify-between px-4 border-b border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800">
              <div className="flex items-center gap-3">
                <button onClick={() => setShowSidebar(!showSidebar)}
                  className="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-colors">
                  {showSidebar ? (
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                  ) : (
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                  )}
                </button>
                <h1 className="text-lg font-semibold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">Claudy</h1>
              </div>
              <div className="flex items-center gap-2">
                <select value={currentModel} onChange={e => changeModel(e.target.value)}
                  className="text-sm px-3 py-1.5 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                  {models.map(m => <option key={m.id} value={m.id}>{m.name || m.id}</option>)}
                </select>
                <button onClick={() => setShowSettings(!showSettings)}
                  className="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-colors">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.68 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                </button>
              </div>
            </header>
            {showSettings ? (
              <Settings config={config} onClose={() => setShowSettings(false)} onSave={loadConfig} />
            ) : (
              <Chat messages={messages} isLoading={isLoading} onSend={sendMessage} onCreateSession={createSession} />
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
